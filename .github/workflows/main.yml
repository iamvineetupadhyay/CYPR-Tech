name: Automated Deployment to AWS EC2

on:
  push:
    branches:
      - main  # Jab bhi main branch par push hoga, ye active hoga

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Connecting to server and fetching new code..."
            cd ~/app/cypr/backend
            git pull origin main
            
            echo "🏗️ Making Maven wrapper executable and building JAR..."
            chmod +x ./mvnw
            ./mvnw clean package -DskipTests
            
            echo "🛑 Stopping old running background process..."
            pkill -f 'java -jar' || true
            
            echo "🔄 Copying new artifact and launching application..."
            cp target/*.jar app.jar
            
            PASSWORD="Vineet5704"
            URL="jdbc:postgresql://cypr-db.ct2uem2kwuhw.ap-south-1.rds.amazonaws.com:5432/cypr"
            
            nohup java -Xms200m -Xmx400m \
              -Dspring.datasource.url="$URL" \
              -Dspring.datasource.username=postgres \
              -Dspring.datasource.password="$PASSWORD" \
              -DVIRUSTOTAL_API_KEY="${{ secrets.VIRUSTOTAL_KEY }}" \
              -DBREVO_API_KEY="${{ secrets.BREVO_KEY }}" \
              -DTURNSTILE_SECRET_KEY="${{ secrets.TURNSTILE_KEY }}" \
              -Dturnstile.enabled=true \
              -jar app.jar > app.log 2>&1 &
              
            echo "✅ Application successfully deployed securely in background!"
