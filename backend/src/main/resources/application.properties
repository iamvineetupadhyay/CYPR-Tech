# ================================
# SERVER CONFIG
# ================================
server.port=${PORT:8080}

# ================================
# VIRUSTOTAL API CONFIG
# ================================
virustotal.api.key=${VIRUSTOTAL_API_KEY:}
virustotal.poll.interval.ms=2000
virustotal.poll.maxAttempts=15

# ====================================================================
# PRODUCTION CLOUD DATABASE CONFIG (AMAZON RDS)
# ====================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/cypr}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / HIBERNATE CONFIG
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ================================
# CONNECTION POOL TUNING (HIKARICP)
# ================================
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ================================
# RESPONSE COMPRESSION
# ================================
server.compression.enabled=true
server.compression.min-response-size=2048
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# ================================
# SECURITY & JWT CONFIG
# ================================
cypr.jwt.secret=${CYPR_JWT_SECRET:LOCAL_DEV_SECRET_KEY_DO_NOT_USE_IN_PRODUCTION_123456}
cypr.jwt.expiration-hours=24
cypr.allowed.origins=${CYPR_ALLOWED_ORIGINS:*}

# ================================
# BREVO EMAIL API CONFIG
# ================================
brevo.api.key=${BREVO_API_KEY:APNA_KEY_YAHAN_DAALO}
brevo.sender.email=${BREVO_SENDER_EMAIL:mail.cyprtech@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:CYPR}

# ================================
# BASE URLS
# ================================
frontend.base-url=${FRONTEND_BASE_URL:https://cyprtech.vercel.app}
backend.base-url=${BACKEND_BASE_URL:http://localhost:8080}

# ================================
# CLOUDFLARE TURNSTILE CAPTCHA CONFIG
# ================================
turnstile.enabled=${TURNSTILE_ENABLED:false}
turnstile.secret.key=${TURNSTILE_SECRET_KEY:DUMMY_SECRET_KEY_LOCAL}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================================
# GOOGLE OAUTH 2.0 CONFIG
# ================================
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}
google.redirect.uri=${GOOGLE_REDIRECT_URI:${backend.base-url}/api/oauth/google/callback}

# ================================
# GITHUB OAUTH CONFIG
# ================================
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
github.redirect.uri=${GITHUB_REDIRECT_URI:${backend.base-url}/api/oauth/github/callback}

# ================================
# ACTUATOR MONITORING & HEALTH
# ================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoints.web.base-path=/api/v1/system/actuator

# ================================
# TRUSTED PROXY RESOLUTION (X-Forwarded-For)
# ================================
server.forward-headers-strategy=framework