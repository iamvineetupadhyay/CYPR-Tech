    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 60px;background:var(--bg);box-shadow:0 2px 8px var(--shadow);border-bottom:1px solid var(--border);}

      border: 1px solid transparent;

      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.18s ease;
    }
    .feed-filter-btn:hover {
      background: var(--bg2);
      color: var(--text);
      border-color: var(--border);
    }
    .feed-filter-btn.active {
      background: var(--lime-dim);
      border-color: var(--lime-glow);
      color: var(--accent);
      font-weight: 700;
    }
    .feed-filter-btn .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text3);
      display: inline-block;
      transition: background 0.18s;
    }
    .feed-filter-btn.active .dot {
      background: var(--accent);
      box-shadow: 0 0 8px var(--lime-glow);
    }
    .feed-filter-btn .feed-badge {
      margin-left: auto;
      font-size: 0.65rem;
      font-family: var(--font-mono, monospace);
      background: var(--bg3);
      color: var(--text3);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .feed-filter-btn.active .feed-badge {
      background: var(--accent);
      color: #ffffff;
    }

    /* News Content Area */
    .news-content-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    /* Pagination Styles */
    .pagination-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 36px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .pagination-btn {
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text2);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .pagination-btn:hover:not(:disabled) {

      color: var(--text);
    }
    .pagination-btn.active {
      background: var(--accent);

      color: #ffffff;
      font-weight: 700;
    }

<script>
const feeds = [
  { name: 'The Hacker News', tag: 'News', url: 'https://feeds.feedburner.com/TheHackersNews' },
  { name: 'BleepingComputer', tag: 'News', url: 'https://www.bleepingcomputer.com/feed/' },
  { name: 'KrebsOnSecurity', tag: 'Cybercrime', url: 'https://krebsonsecurity.com/feed/' },
  { name: 'CISA Alerts', tag: 'Advisory', url: 'https://www.cisa.gov/cybersecurity-advisories/all.xml' },
  { name: 'NIST Cybersecurity', tag: 'Research', url: 'https://www.nist.gov/news-events/information%20technology/rss.xml' },
  { name: 'InfoSecurity Magazine', tag: 'Operations', url: 'https://www.infosecurity-magazine.com/rss/news/' },
  { name: 'Dark Reading', tag: 'News', url: 'https://www.darkreading.com/rss.xml' },
  { name: 'SecurityWeek', tag: 'News', url: 'https://www.securityweek.com/feed/' }
];

const newsGrid = document.getElementById('newsGrid');
const newsStatus = document.getElementById('newsStatus');
const refreshNews = document.getElementById('refreshNews');
const feedFilterList = document.getElementById('feedFilterList');
const paginationWrap = document.getElementById('paginationWrap');

// Pagination & Filter State
let allNewsItems = [];
let filteredNewsItems = [];
let currentPage = 1;
const itemsPerPage = 9; // 3x3 layout
let activeSourceFilter = 'all';

function stripHtml(value = '') {
  const div = document.createElement('div');
  div.innerHTML = value;
  return (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
}

function escapeHtml(value = '') {
  const div = document.createElement('div');
  div.textContent = value;
  return div.innerHTML;
}

function shortText(value, limit = 180) {
  const clean = stripHtml(value);
  if (clean.length <= limit) return clean;
  return `${clean.slice(0, limit).trim()}...`;
}

function formatDate(value) {
  const date = new Date(value);
  if (!value || Number.isNaN(date.getTime())) return 'Latest';
  return date.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function normalizeItem(item, feed) {
  return {
    source: feed.name,
    tag: feed.tag,
    title: stripHtml(item.title || 'Untitled cyber update'),
    link: item.link || item.guid || '#',
    date: item.pubDate || item.isoDate || item.published || item.updated || '',
    description: shortText(item.description || item.content || item.summary || 'Open CYPR Tech AI article for details.'),
    author: stripHtml(item.author || item.creator || item['dc:creator'] || feed.name),
    image: item.thumbnail || item.enclosure?.link || item.enclosure?.url || item.image || item.image_url || ''
  };
}

async function fetchViaRss2Json(feed) {
  const endpoint = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error(`Unable to read ${feed.name}`);
  const data = await response.json();
  if (!Array.isArray(data.items)) throw new Error(`No articles found for ${feed.name}`);
  return data.items.slice(0, 15).map(item => normalizeItem(item, feed));
}

async function fetchViaAllOrigins(feed) {
  const endpoint = `https://api.allorigins.win/raw?url=${encodeURIComponent(feed.url)}`;
  const response = await fetch(endpoint);
  if (!response.ok) throw new Error(`Unable to read ${feed.name}`);
  const xmlText = await response.text();
  const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
  return [...xml.querySelectorAll('item, entry')].slice(0, 15).map(node => normalizeItem({
    title: node.querySelector('title')?.textContent,
    link: node.querySelector('link')?.getAttribute('href') || node.querySelector('link')?.textContent,
    pubDate: node.querySelector('pubDate, published, updated')?.textContent,
    description: node.querySelector('description, summary')?.textContent,
    content: node.getElementsByTagName('content:encoded')[0]?.textContent || node.querySelector('content')?.textContent,
    author: node.querySelector('author')?.textContent || node.getElementsByTagName('dc:creator')[0]?.textContent,
    thumbnail: node.getElementsByTagName('media:thumbnail')[0]?.getAttribute('url') || node.getElementsByTagName('media:content')[0]?.getAttribute('url') || node.querySelector('enclosure')?.getAttribute('url')
  }, feed));
}

async function loadFeed(feed) {
  try { return await fetchViaRss2Json(feed); }
  catch (error) { return fetchViaAllOrigins(feed); }
}

function badgeClass(tag) {
  if (tag === 'Advisory' || tag === 'Research') return 'badge-warn';
  if (tag === 'Operations') return 'badge-accent';
  return 'badge-green';
}

// Render Feeds Left Sidebar filter list
function renderSidebar() {
  if (!feedFilterList) return;
  
  const countMap = {};
  allNewsItems.forEach(item => {
    countMap[item.source] = (countMap[item.source] || 0) + 1;
  });
  
  let html = `
    <button class="feed-filter-btn ${activeSourceFilter === 'all' ? 'active' : ''}" onclick="applyFilter('all')">
      <span class="dot"></span>
      All Sources
      <span class="feed-badge">${allNewsItems.length}</span>
    </button>
  `;
  
  feeds.forEach(feed => {
    const count = countMap[feed.name] || 0;
    if (count > 0) {
      html += `
        <button class="feed-filter-btn ${activeSourceFilter === feed.name ? 'active' : ''}" onclick="applyFilter('${feed.name}')">
          <span class="dot"></span>
          ${feed.name}
          <span class="feed-badge">${count}</span>
        </button>
      `;
    }
  });
  
  feedFilterList.innerHTML = html;
}

// Filter Action
function applyFilter(sourceName) {
  activeSourceFilter = sourceName;
  if (sourceName === 'all') {
    filteredNewsItems = allNewsItems;
  } else {
    filteredNewsItems = allNewsItems.filter(item => item.source === sourceName);
  }
  currentPage = 1;
  renderSidebar();
  renderCurrentPage();
}

// Render current page items inside Grid
function renderCurrentPage() {
  const start = (currentPage - 1) * itemsPerPage;
  const end = start + itemsPerPage;
  const pageItems = filteredNewsItems.slice(start, end);
  
  renderNews(pageItems);
  renderPaginationControls();
}

function renderNews(items) {
  if (!items.length) {
    newsGrid.innerHTML = '<div class="news-empty">No news articles found for this selection.</div>';
    return;
  }
  
  const highlightUrl = new URLSearchParams(window.location.search).get('highlight');
  
  newsGrid.innerHTML = items.map(item => {
    let isHighlighted = false;
    if (highlightUrl) {
      const decodedUrl = decodeURIComponent(highlightUrl);
      if (item.link === decodedUrl) {
        isHighlighted = true;
      } else if (decodedUrl === 'ransomware' && item.title.toLowerCase().includes('ransomware')) {
        isHighlighted = true;
      } else if (decodedUrl === 'windows' && item.title.toLowerCase().includes('windows')) {
        isHighlighted = true;
      } else if (decodedUrl === 'phishing' && item.title.toLowerCase().includes('phishing')) {
        isHighlighted = true;
      }
    }
    
    return `
      <a class="card news-card ${isHighlighted ? 'flash-highlight' : ''}" href="news-article.html?url=${encodeURIComponent(item.link)}">
        <div class="news-thumb">${item.image ? `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.src='assets/default-news.jpg'; this.onerror=null;">` : '<img src="assets/default-news.jpg" alt="CYPR Tech News" loading="lazy">'}</div>
        <div class="news-card-top"><span class="badge ${badgeClass(item.tag)}">${escapeHtml(item.source)}</span><span class="news-date">${formatDate(item.date)}</span></div>
        <h3>${escapeHtml(item.title)}</h3>
        <p>${escapeHtml(item.description)}</p>
        <div class="news-card-foot"><span class="metric-label">${escapeHtml(item.author || item.source)}</span><span class="feature-link">Read AI Article</span></div>
      </a>
    `;
  }).join('');

  if (highlightUrl) {
    setTimeout(() => {
      const targetCard = document.querySelector('.news-card.flash-highlight');
      if (targetCard) {
        targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 400);
  }
}

// Render dynamic pagination buttons
function renderPaginationControls() {
  if (!paginationWrap) return;
  
  const totalPages = Math.ceil(filteredNewsItems.length / itemsPerPage) || 1;
  
  if (totalPages <= 1) {
    paginationWrap.innerHTML = '';
    return;
  }
  
  let html = `
    <button class="pagination-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
      &larr; Prev
    </button>
  `;
  
  for (let i = 1; i <= totalPages; i++) {
    html += `
      <button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
        ${i}
      </button>
    `;
  }
  
  html += `
    <button class="pagination-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
      Next &rarr;
    </button>
  `;
  
  paginationWrap.innerHTML = html;
}

function goToPage(page) {
  const totalPages = Math.ceil(filteredNewsItems.length / itemsPerPage) || 1;
  if (page < 1 || page > totalPages) return;
  currentPage = page;
  renderCurrentPage();
  window.scrollTo({ top: newsGrid.offsetTop - 120, behavior: 'smooth' });
}

async function loadNews(forceRefresh = false) {
  refreshNews.disabled = true;
  
  const CACHE_KEY = 'cypr_news_cache';
  const CACHE_TIME_KEY = 'cypr_news_cache_time';
  const CACHE_DURATION = 15 * 60 * 1000;
  
  const cachedData = localStorage.getItem(CACHE_KEY);
  const cachedTime = localStorage.getItem(CACHE_TIME_KEY);
  const now = Date.now();
  
  let items = [];
  let fromCache = false;
  
  if (!forceRefresh && cachedData && cachedTime && (now - cachedTime < CACHE_DURATION)) {
    items = JSON.parse(cachedData);
    fromCache = true;
  } else {
    newsStatus.textContent = 'Loading latest cyber news...';
    
    const feedPromises = feeds.map(async (feed) => {
      try {
        // Fetch feed with an individual timeout of 5 seconds
        const fetchPromise = loadFeed(feed);
        const timeoutPromise = new Promise((_, reject) => 
          setTimeout(() => reject(new Error('Timeout')), 5000)
        );
        return await Promise.race([fetchPromise, timeoutPromise]);
      } catch (err) {
        console.warn(`Feed ${feed.name} failed:`, err);
        return null;
      }
    });

    let succeededFeedsCount = 0;
    try {
      const results = await Promise.all(feedPromises);
      succeededFeedsCount = results.filter(Boolean).length;
      items = results.filter(Boolean).flat().sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    } catch (err) {
      console.error("News load error:", err);
    }
    
    if (items && items.length > 0) {
      localStorage.setItem(CACHE_KEY, JSON.stringify(items));
      localStorage.setItem(CACHE_TIME_KEY, now.toString());
      newsStatus.textContent = `${items.length} fresh articles loaded (from ${succeededFeedsCount}/${feeds.length} sources)`;
    }
  }
  
  if (!items || items.length === 0) {
    const backupCache = localStorage.getItem(CACHE_KEY);
    if (backupCache) {
      items = JSON.parse(backupCache);
      newsStatus.textContent = `Loaded from offline cache due to connection timeout`;
    } else {
      items = fallbackNews;
      newsStatus.textContent = `Loaded offline curated threat intelligence feeds (fallback)`;
    }
  } else if (fromCache) {
    newsStatus.textContent = `${items.length} articles loaded from cache (auto-refreshes in ${Math.round((CACHE_DURATION - (now - cachedTime)) / 60000)}m)`;
  }
  
  allNewsItems = items;
  filteredNewsItems = items;
  
  // Highlight url check to direct page locking
  const highlightUrl = new URLSearchParams(window.location.search).get('highlight');
  if (highlightUrl) {
    const decodedUrl = decodeURIComponent(highlightUrl);
    const idx = filteredNewsItems.findIndex(item => item.link === decodedUrl);
    if (idx !== -1) {
      currentPage = Math.floor(idx / itemsPerPage) + 1;
    }
  } else {
    currentPage = 1;
  }
  
  renderSidebar();
  renderCurrentPage();
  
  refreshNews.disabled = false;
}

function toggleSources() {
  const wrapper = document.getElementById('newsLayoutWrapper');
  const btn = document.getElementById('toggleSourcesBtn');
  if (!wrapper || !btn) return;
  
  const isHidden = wrapper.classList.toggle('sources-hidden');
  localStorage.setItem('cypr_sources_visible', isHidden ? 'false' : 'true');
  
  if (isHidden) {
    btn.style.background = 'none';
    btn.style.borderColor = 'var(--border)';
  } else {
    btn.style.background = 'var(--bg3)';
    btn.style.borderColor = 'var(--border2)';
  }
}

// Restore sidebar toggle state on load
window.addEventListener('DOMContentLoaded', () => {
  const visible = localStorage.getItem('cypr_sources_visible') ?? 'true';
  const wrapper = document.getElementById('newsLayoutWrapper');
  const btn = document.getElementById('toggleSourcesBtn');
  if (wrapper && btn) {
    if (visible === 'false') {
      wrapper.classList.add('sources-hidden');
      btn.style.background = 'none';
      btn.style.borderColor = 'var(--border)';
    } else {
      wrapper.classList.remove('sources-hidden');
      btn.style.background = 'var(--bg3)';
      btn.style.borderColor = 'var(--border2)';
    }
  }
});

refreshNews.addEventListener('click', () => loadNews(true));
loadNews();
</script>
